model:
  config_path: Qwen/Qwen3-30B-A3B
  tokenizer_path: Qwen/Qwen3-30B-A3B
  ops_implementation:
    attn_implementation: flash_attention_2
    moe_implementation: fused_triton

data:
  train_path: configs/text/data/fineweb_finewiki.yaml
  eval_path: configs/text/data/fineweb_finewiki_val.yaml
  multisource_datasets_type: veomni_weighted_multisource
  train_size: 1000000000
  dataloader:
    type: native
    drop_last: true
    num_workers: 8
  datasets_type: iterable
  data_type: plaintext
  max_seq_len: 4096
  text_keys: text
  dyn_bsz_buffer_size: 200

train:
  accelerator:
    ulysses_size: 1
    ep_size: 1
    fsdp_config:
      fsdp_mode: fsdp2
      full_shard: true
      offload: false
      mixed_precision:
        enable: true
    offload_config:
      enable_activation: false
  gradient_checkpointing:
    enable: true
  global_batch_size: 32
  micro_batch_size: 1
  eval_global_batch_size: 16
  eval_micro_batch_size: 4
  eval_dataloader_num_workers: 1
  log_train_source_loss_steps: 5
  bsz_warmup_ratio: 0.007
  eval_steps: 5
  eval_epochs: 0
  max_steps: 1
  optimizer:
    type: adamw
    lr: 2.0e-4
    lr_warmup_ratio: 0.007
    lr_decay_style: cosine
    weight_decay: 0.01
    max_grad_norm: 1.0
  init_device: meta
  enable_full_determinism: false
  empty_cache_steps: 500
  checkpoint:
    output_dir: exp/qwen3-30b-a3b-fineweb-finewiki-scratch-smoke
    manager: dcp
    save_steps: 0
    save_epochs: 0
    save_hf_weights: false
  wandb:
    enable: true
    project: qwen3-pretrain
    name: Qwen3-30B-A3B-FineWeb-FineWiki-scratch-smoke
